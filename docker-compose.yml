version: '3.8'
services:
    ebot-web:
        build:
            context: ./ebot-web
        environment:
            - EBOT_ADMIN_LOGIN
            - EBOT_ADMIN_PASSWORD
            - EBOT_ADMIN_EMAIL
        volumes:
            - "eBotWebStorage:/var/www/storage"
            - "eBotWebPublic:/var/www/public"
            - "./ebot-logs:/app/ebot-logs"
            - "./ebot-demos:/app/ebot-demos"
            - "./etc/eBotWeb/.env:/var/www/.env"
        depends_on:
            mysqldb:
                condition: service_healthy
            redis:
                condition: service_started

    ebot-socket:
        build:
            context: ./ebot-socket
        ports:
            - "12360:12360"
        volumes:
            - "./ebot-logs:/app/eBot-CSGO/logs"
            - "./ebot-demos:/app/eBot-CSGO/demos"
            - "./etc/eBotSocket/config.ini:/app/eBot-CSGO/config/config.ini"
        depends_on:
            mysqldb:
                condition: service_healthy
            redis:
                condition: service_started
            ebot-web:
                condition: service_started

    ebot-logs-receiver:
        build:
            context: ./ebot-logs-receiver
        ports:
            - "12345:12345/udp"
        volumes:
            - "./etc/eBotLogReceiver/config.json:/configs/config.json"
        depends_on:
            redis:
                condition: service_started

    mysqldb:
        image: mysql:8.4
        restart: always
        command: --mysql-native-passwords=ON
        environment:
            - MYSQL_DATABASE
            - MYSQL_ROOT_PASSWORD
            - MYSQL_USER
            - MYSQL_PASSWORD
        volumes:
            - "./data/db/mysql:/var/lib/mysql"
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s

    redis:
        image: redis:7-alpine
        restart: always
        volumes:
            - ./data/redis:/data

    nginx:
        image: nginx:alpine
        volumes:
            - "./etc/nginx/default.conf:/etc/nginx/conf.d/default.conf"
            - "eBotWebPublic:/var/www/public"
        ports:
            - "80:80"
            - "443:443"
        restart: always
        depends_on:
            - ebot-web
            - mysqldb

volumes:
    eBotWebStorage:
    eBotWebPublic:
